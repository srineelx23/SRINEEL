<div class="dashboard-layout">
    <!-- Display Error/Success Messages -->
    @if (errorMessage()) {
    <div class="error-toast">
        {{ errorMessage() }}
    </div>
    }
    @if (successMessage()) {
    <div class="success-toast">
        {{ successMessage() }}
    </div>
    }

    <!-- Modular Navbar -->
    <app-navbar 
        [activeTab]="activeTab()" 
        [officerName]="officerName()" 
        [userRole]="userRole()"
        (onTabSwitch)="switchTab($event)"
        (onLogout)="logout()"
        (onGoHome)="goHome()">
    </app-navbar>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Overview Tab -->
        @if (activeTab() === 'overview') {
        <app-overview
            [officerName]="officerName()"
            [pendingClaims]="pendingClaims()"
            [reviewedClaims]="reviewedClaims()"
            [totalPending]="totalPending()"
            [totalReviewed]="totalReviewed()"
            [sortedPendingClaims]="sortedPendingClaims()"
            (onTabSwitch)="switchTab($event)"
            (onOpenClaimReview)="openClaimReview($event)">
        </app-overview>
        }

        <!-- Pending Claims Tab -->
        @if (activeTab() === 'pending') {
        <app-claims
            [pendingClaims]="pendingClaims()"
            [sortedPendingClaims]="sortedPendingClaims()"
            [selectedClaim]="selectedClaim()"
            [claimsSortOption]="claimsSortOption()"
            [payoutLoading]="payoutLoading()"
            [decisionForm]="decisionForm"
            [payoutBreakdown]="payoutBreakdown()"
            [payoutWarning]="getPayoutWarning()"
            (onOpenClaimReview)="openClaimReview($event)"
            (onCloseClaimReview)="closeClaimReview()"
            (onClaimsSortOptionChange)="claimsSortOption.set($event)"
            (onUpdateBreakdown)="updateBreakdown()"
            (onSubmitDecision)="submitDecision()">
        </app-claims>
        }

        <!-- History Tab -->
        @if (activeTab() === 'history') {
        <app-history
            [reviewedClaims]="reviewedClaims()"
            [sortedReviewedClaims]="sortedReviewedClaims()"
            [selectedClaim]="selectedClaim()"
            [claimsSortOption]="claimsSortOption()"
            (onOpenClaimReview)="openClaimReview($event)"
            (onCloseClaimReview)="closeClaimReview()"
            (onClaimsSortOptionChange)="claimsSortOption.set($event)">
        </app-history>
        }

        <!-- Settings Tab -->
        @if (activeTab() === 'settings') {
        <app-settings
            [officerName]="officerName()"
            [userRole]="userRole()"
            [changePwdLoading]="changePwdLoading()"
            (onChangePassword)="changePasswordWithData($event)">
        </app-settings>
        }
    </main>
</div>
