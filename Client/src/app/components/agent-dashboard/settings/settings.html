<div class="tab-content fade-in">
    <header class="page-header">
        <h1 class="page-title">Settings</h1>
        <p class="page-subtitle">Manage your account preferences and security.</p>
    </header>

    <div style="display: grid; grid-template-columns: 350px 1fr; gap: 32px; align-items: start;">
        <!-- Profile Info Card -->
        <div class="glass-panel" style="padding: 32px; text-align: center;">
            <div
                style="width: 100px; height: 100px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 700; margin: 0 auto 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                {{ agentName().charAt(0) }}
            </div>
            <h2 style="margin-bottom: 4px;">{{ agentName() }}</h2>
            <p style="color: var(--accent); font-weight: 600; margin-bottom: 24px;">{{ userRole() }}</p>

            <div
                style="text-align: left; background: var(--card-inner-bg); padding: 16px; border-radius: 12px; border: 1px solid var(--card-inner-border);">
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px;">Department</p>
                <p style="font-weight: 500; margin-bottom: 12px;">Field Operations & Underwriting</p>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px;">Assigned Region</p>
                <p style="font-weight: 500;">North Maharashtra Area</p>
            </div>
        </div>

        <!-- Change Password Section -->
        <div class="glass-panel" style="padding: 40px;">
            <h3 style="margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
                <i class="fa-solid fa-lock" style="color: var(--accent);"></i>
                Security: Change Password
            </h3>

            <form class="vims-form" (ngSubmit)="submitChangePassword()">
                <!-- Current Password -->
                <div class="form-group">
                    <input [type]="showCurrentPwd ? 'text' : 'password'" id="currentPassword"
                        name="currentPassword" class="form-control" [(ngModel)]="changePasswordForm.currentPassword"
                        placeholder=" " required>
                    <label for="currentPassword" class="floating-label">Current Password</label>
                    <i class="fa-solid" [class.fa-eye]="!showCurrentPwd" [class.fa-eye-slash]="showCurrentPwd"
                        (click)="showCurrentPwd = !showCurrentPwd"
                        style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); z-index: 20;"></i>
                </div>

                <!-- New Password -->
                <div class="form-group">
                    <input [type]="showNewPwd ? 'text' : 'password'" id="newPassword" name="newPassword"
                        class="form-control" [(ngModel)]="changePasswordForm.newPassword" placeholder=" "
                        required>
                    <label for="newPassword" class="floating-label">New Password</label>
                    <i class="fa-solid" [class.fa-eye]="!showNewPwd" [class.fa-eye-slash]="showNewPwd"
                        (click)="showNewPwd = !showNewPwd"
                        style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); z-index: 20;"></i>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <input [type]="showConfirmPwd ? 'text' : 'password'" id="confirmPassword"
                        name="confirmPassword" class="form-control" [(ngModel)]="changePasswordForm.confirmPassword"
                        placeholder=" " required>
                    <label for="confirmPassword" class="floating-label">Confirm New Password</label>
                    <i class="fa-solid" [class.fa-eye]="!showConfirmPwd" [class.fa-eye-slash]="showConfirmPwd"
                        (click)="showConfirmPwd = !showConfirmPwd"
                        style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); z-index: 20;"></i>
                </div>

                <div style="margin-top: 8px;">
                    <button type="submit" class="btn-primary" [disabled]="changePwdLoading()"
                        style="padding: 14px 40px; border-radius: 12px;">
                        @if (changePwdLoading()) {
                        <i class="fa-solid fa-circle-notch fa-spin" style="margin-right: 8px;"></i> Updating...
                        } @else {
                        Update Password
                        }
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
