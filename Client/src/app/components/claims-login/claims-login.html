<div class="full-screen admin-bg login-page relative overflow-hidden">
    <!-- Back Button -->
    <a href="/" class="back-btn">
        <span>←</span> Return to Home
    </a>

    <!-- Error Toast Component -->
    <div *ngIf="errorMessage()" class="error-toast">
        ⚠️ {{ errorMessage() }}
    </div>

    <div class="login-wrapper container">
        <div class="login-card glass-panel">
            <!-- Left Info Side -->
            <div class="login-info"
                style="background: linear-gradient(135deg, rgba(80, 150, 113, 0.3) 0%, rgba(10, 10, 10, 0.6) 100%);">
                <div class="brand">
                    <span class="logo-shield">📋</span>
                    <h2>VIMS CLAIMS</h2>
                </div>
                <h3>Officer Portal</h3>
                <p>Verify, assess, and approve policy claims to maintain fair and rapid customer resolutions.</p>

                <div class="info-footer">
                    <span>Not a claims officer?</span>
                    <a href="/login" class="link-styled">Return to Customer Login ➔</a>
                </div>
            </div>

            <!-- Right Form Side -->
            <div class="login-form-container">
                <h2 class="form-title">Claims Authentication</h2>
                <form class="vims-form" (ngSubmit)="login()">
                    <div class="form-group">
                        <input type="email" id="email" name="email" [(ngModel)]="email" class="form-control"
                            placeholder="" required>
                        <label for="email" class="floating-label">Officer Email</label>
                    </div>

                    <div class="form-group">
                        <input type="password" id="password" name="password" [(ngModel)]="password" class="form-control"
                            placeholder="" required>
                        <label for="password" class="floating-label">Password</label>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember device
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary full-width-btn"
                        style="background: var(--success); color: var(--bg-card)">Access Claims Desktop</button>
                </form>
            </div>
        </div>
    </div>
</div>
