<div class="full-screen admin-bg login-page relative overflow-hidden">
    <!-- Back Button -->
    <a href="/" class="back-btn">
        <span>←</span> Return to Home
    </a>

    <!-- Error Toast Component -->
    <div *ngIf="errorMessage()" class="error-toast">
        ⚠️ {{ errorMessage() }}
    </div>

    <div class="login-wrapper container">
        <div class="login-card glass-panel">
            <!-- Left Info Side -->
            <div class="login-info"
                style="background: linear-gradient(135deg, rgba(91, 192, 190, 0.05) 0%, rgba(10, 10, 10, 0.6) 100%);">
                <div class="brand">
                    <span class="logo-shield">🔐</span>
                    <h2>VIMS ADMIN</h2>
                </div>
                <h3>Secure Portal</h3>
                <p>Welcome to the Administrative Control Center. Authorized personnel only.</p>

                <div class="info-footer">
                    <span>Wrong portal?</span>
                    <a href="/login" class="link-styled">Return to Customer Login ➔</a>
                </div>
            </div>

            <!-- Right Form Side -->
            <div class="login-form-container">
                <h2 class="form-title">Administrator Login</h2>
                <form class="vims-form" (ngSubmit)="login()">
                    <div class="form-group">
                        <input type="email" id="email" name="email" [(ngModel)]="email" class="form-control"
                            placeholder="" required>
                        <label for="email" class="floating-label">Admin Email</label>
                    </div>

                    <div class="form-group">
                        <input type="password" id="password" name="password" [(ngModel)]="password" class="form-control"
                            placeholder="" required>
                        <label for="password" class="floating-label">Security Key (Password)</label>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember device
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary full-width-btn"
                        style="background: var(--text-muted); color: var(--bg-card)">Authenticate Admin</button>
                </form>
            </div>
        </div>
    </div>
</div>
